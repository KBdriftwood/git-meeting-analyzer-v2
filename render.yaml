services:
  - type: web
    name: git-meeting-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: AI_BACKEND
        value: openai
      - key: OPENAI_API_KEY
        sync: false
